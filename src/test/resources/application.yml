spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MSSQLServer;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password: sa
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test
            client-secret: test
            scope:
              - openid
              - profile
              - email

payos:
  client-id: test
  api-key: test
  checksum-key: test

jwt:
  secret: VGhpc0lzQVN1cGVyTG9uZ0RlbW9TZWNyZXRLZXlGb3JKV1RUb2tlblNpZ25pbmdBdExlYXN0MzJCeXRlcw==
  access-token-expiration-ms: 86400000
  refresh-token-expiration-ms: 604800000
